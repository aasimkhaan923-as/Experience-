<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>میرا پہلا آٹومیشن تجربہ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            text-align: center;
            padding: 30px 15px;
            margin: 0;
        }
        .bot-box {
            background: #1e293b;
            border: 2px solid #3b82f6;
            padding: 20px;
            border-radius: 15px;
            display: block;
            max-width: 400px;
            margin: 20px auto;
        }
        #time-display {
            font-size: 24px;
            color: #34d399;
            font-weight: bold;
        }
        .quote-box {
            border-color: #10b981;
        }
        #quote-display {
            font-size: 16px;
            color: #fbbf24;
            font-style: italic;
            margin-top: 10px;
            line-height: 1.4;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>

    <h1>🤖 آٹومیشن مشن: اسٹیپ 2</h1>
    <p>عاصم بھائی، ہمارا بوٹ اب انٹرنیٹ سے لائیو ڈیٹا کھینچ رہا ہے!</p>

    <!-- ٹاسک 1: ٹائم بوٹ -->
    <div class="bot-box">
        <h3>🕒 بوٹ کا ٹاسک 1:</h3>
        <p>بیک گراؤنڈ میں ہر سیکنڈ بعد ٹائم اپڈیٹ کرنا:</p>
        <div id="time-display">لوڈنگ...</div>
    </div>

    <!-- ٹاسک 2: لائیو ڈیٹا انٹرنیٹ بوٹ -->
    <div class="bot-box quote-box">
        <h3>🌐 بوٹ کا ٹاسک 2 (انٹرنیٹ ڈیٹا):</h3>
        <p>یہ بوٹ لائیو انٹرنیٹ API سے ڈیٹا کھینچ رہا ہے:</p>
        <div id="quote-display">انٹرنیٹ سے ڈیٹا لایا جا رہا ہے...</div>
        <button onclick="fetchLiveQuote()">ابھی نیا ڈیٹا لاؤ 🔄</button>
    </div>

    <script>
        // 🕒 ٹاسک 1 کی لاجک (ٹائم اپڈیٹ)
        function runTimeBot() {
            const currentTime = new Date().toLocaleTimeString();
            document.getElementById('time-display').innerText = currentTime;
        }
        setInterval(runTimeBot, 1000);

        // 🌐 ٹاسک 2 کی لاجک (انٹرنیٹ سے خودکار ڈیٹا کھینچنا)
        async function fetchLiveQuote() {
            const display = document.getElementById('quote-display');
            display.innerText = "بوٹ انٹرنیٹ پر جا رہا ہے...";
            
            try {
                // یہ لائن ایک لائیو فری API (انٹرنیٹ سرور) سے ڈیٹا کھینچتی ہے
                const response = await fetch('https://dummyjson.com/quotes/random');
                const data = await response.json();
                
                // خودکار طریقے سے ڈیٹا کو سکرین پر فٹ کرنا
                display.innerHTML = `"${data.quote}" <br><br><strong>— ${data.author}</strong>`;
            } catch (error) {
                display.innerText = "ڈیٹا لانے میں ناکامی! انٹرنیٹ چیک کریں۔";
            }
        }

        // 🚀 جیسے ہی پیج لوڈ ہو، بوٹ پہلی بار انٹرنیٹ پر خود ہی جائے
        fetchLiveQuote();

        // 🔄 ہر 10 سیکنڈ بعد بوٹ خود بخود نیا ڈیٹا انٹرنیٹ سے لائے گا
        setInterval(fetchLiveQuote, 10000);
    </script>

</body>
</html>
