<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>میرا پہلا آٹومیشن تجربہ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            text-align: center;
            padding: 50px;
        }
        .bot-box {
            background: #1e293b;
            border: 2px solid #3b82f6;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            margin-top: 20px;
        }
        #time-display {
            font-size: 24px;
            color: #34d399;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🤖 آٹومیشن مشن: شروع!</h1>
    <p>عاصم بھائی، یہ ہمارا پہلا خودکار جاوا اسکرپٹ پروجیکٹ ہے۔</p>

    <div class="bot-box">
        <h3>🕒 بوٹ کا خودکار ٹاسک:</h3>
        <p>یہ بوٹ بیک گراؤنڈ میں ہر سیکنڈ بعد ٹائم اپڈیٹ کر رہا ہے:</p>
        <div id="time-display">لوڈنگ...</div>
    </div>

    <!-- 🧠 یہ ہے بوٹ کا دماغ (JavaScript) -->
    <script>
        function runMyFirstBot() {
            // یہ لائن ہر بار نیا ٹائم نکالتی ہے
            const currentTime = new Date().toLocaleTimeString();
            
            // یہ لائن خود بخود اسکرین پر ٹائم تبدیل کر دیتی ہے
            document.getElementById('time-display').innerText = currentTime;
        }

        // 🚀 آٹومیشن کا جادو: ہر 1000 ملی سیکنڈ (1 سیکنڈ) بعد اس فنکشن کو خود بخود چلاؤ!
        setInterval(runMyFirstBot, 1000);
    </script>

</body>
</html>
