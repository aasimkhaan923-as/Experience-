<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عاصم بھائی کا سمارٹ آٹومیشن ڈیش بورڈ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            text-align: center;
            padding: 20px 15px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .dashboard-card {
            background: #111827;
            border: 1px solid #1f2937;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .stat-box {
            background: #1f2937;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
        }
        .alert-red { border-left: 4px solid #ef4444; color: #f87171; }
        .success-green { border-left: 4px solid #10b981; color: #34d399; }
        
        input, select {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            background: #1f2937;
            border: 1px solid #374151;
            color: white;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 95%;
            margin-top: 10px;
            font-size: 16px;
        }
        button:hover { background: #2563eb; }
        
        .log-container {
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .log-card {
            background: #1f2937;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚙️ سمارٹ کھاتا اسسٹنٹ (فیز ۱)</h1>
        <p>عاصم بھائی، یہ سسٹم ڈیٹا مانیٹر کر کے بوٹ الرٹ فائر کرنے کے لیے تیار ہو رہا ہے۔</p>
                <!-- لائیو اسٹیٹس مانیٹر -->
        <div class="dashboard-card">
            <h3>📊 لائیو سسٹم مانیٹر</h3>
            <div class="status-grid">
                <div class="stat-box success-green">
                    <span>کل ادھار وصولی</span>
                    <div id="total-income">0 PKR</div>
                </div>
                <div class="stat-box alert-red">
                    <span>کل بقایا ادھار</span>
                    <div id="total-pending">0 PKR</div>
                </div>
            </div>
        </div>

        <!-- ڈیٹا انٹری فارم -->
        <div class="dashboard-card" style="border-color: #3b82f6;">
            <h3>📝 نیا ادھار/وصولی لاگ کریں</h3>
            <input type="text" id="person-name" placeholder="بندے کا نام لکھیں...">
            <input type="number" id="amount" placeholder="رقم (Amount) لکھیں...">
            <select id="transaction-type">
                <option value="pending">ادھار دیا (Pending/بقايا)</option>
                <option value="income">ادھار واپس ملا (Income)</option>
            </select>
            <button onclick="processTransaction()">ڈیٹا پروسیس کریں ⚡</button>
        </div>

        <!-- بوٹ لاگ مانیٹر -->
        <div class="dashboard-card" style="border-color: #a855f7;">
            <h3>🤖 بوٹ بیک اینڈ مانیٹر لاگ</h3>
            <div class="log-container" id="bot-logs">
                <div style="color: #9ca3af; text-align: center;">سسٹم الرٹس کے لیے تیار ہے...</div>
            </div>
        </div>
    </div>
      <script>
        // لائیو ڈیٹا ہولڈرز
        let totalIncome = 0;
        let totalPending = 0;

        function processTransaction() {
            const name = document.getElementById('person-name').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const type = document.getElementById('transaction-type').value;
            const logContainer = document.getElementById('bot-logs');

            // ویلیڈیشن (چیکنگ)
            if (name === "" || isNaN(amount) || amount <= 0) {
                alert("برائے مہربانی صحیح نام اور رقم لکھیں!");
                return;
            }

            // لاجک پروسیسنگ
            if (type === 'income') {
                totalIncome += amount;
                document.getElementById('total-income').innerText = totalIncome + " PKR";
            } else {
                totalPending += amount;
                document.getElementById('total-pending').innerText = totalPending + " PKR";
            }

            // لائیو ٹائم اسٹیمپ
            const timeStamp = new Date().toLocaleTimeString();

            // 🤖 بوٹ الرٹ لاجک ٹرگر (اگر ادھار 2000  سے اوپر جائے تو الرٹ سسٹم ایکٹیو ہو)
            let botAlertMessage = "";
            if (type === 'pending' && amount >= 15000) {
                botAlertMessage = `<span style="color: #ef4444; font-weight: bold;">⚠️ [⚠️ بوٹ الرٹ ٹرگر]: عاصم بھائی، ${name} کو ${amount} کا بڑا ادھار دیا گیا ہے! الرٹ میسج تیار ہے...</span>`;
            } else {
                botAlertMessage = `<span style="color: #34d399;">ℹ️ [سسٹم لاگ]: ${name} کا ${amount} PKR کا ریکارڈ محفوظ کر لیا گیا ہے۔</span>`;
            }

            // مانیٹر میں لاگ انٹری ڈالنا
            const newLog = document.createElement('div');
            newLog.className = 'log-card';
            newLog.innerHTML = `<strong>[${timeStamp}]</strong> ${botAlertMessage}`;
            
            // اگر پہلا عارضی میسج موجود ہے تو اسے ہٹائیں
            if (logContainer.innerHTML.includes("سسٹم الرٹس کے لیے تیار ہے")) {
                logContainer.innerHTML = "";
            }
            
            logContainer.insertBefore(newLog, logContainer.firstChild);

            // ان پٹ فیلڈز صاف کریں
            document.getElementById('person-name').value = "";
            document.getElementById('amount').value = "";
        }
    </script>

</body>
</html>
